<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #07090f;
    --surface:   #0c101a;
    --card:      #111827;
    --border:    rgba(255,255,255,0.07);
    --border-hi: rgba(255,255,255,0.15);
    --gold:      #f5c842;
    --gold-dim:  #c49a1a;
    --silver:    #e2e8f0;
    --muted:     #64748b;
    --green:     #22d3a5;
    --red:       #f87171;
    --text:      #e2e8f0;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* star field */
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,.18) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,.12) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 70%, rgba(255,255,255,.10) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 90%, rgba(255,255,255,.08) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,.14) 0%, transparent 100%);
    pointer-events:none; z-index:0;
  }

  /* subtle gold gradient top */
  body::after {
    content:'';
    position:fixed; top:0; left:0; right:0; height:1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    z-index:10;
  }

  .wrap {
    position:relative; z-index:1;
    width:100%; max-width:680px;
    padding:56px 24px 80px;
    display:flex; flex-direction:column; align-items:center; gap:0;
  }

  /* ── logo / header ── */
  .logo-ring {
    width:64px; height:64px;
    border-radius:50%;
    border:1.5px solid var(--gold-dim);
    display:flex; align-items:center; justify-content:center;
    margin-bottom:20px;
    position:relative;
  }
  .logo-ring::before {
    content:'';
    position:absolute; inset:-6px;
    border-radius:50%;
    border:1px solid rgba(245,200,66,.15);
  }
  .logo-icon { font-size:26px; }

  .brand {
    font-size:28px; font-weight:700;
    letter-spacing:-.02em;
    color:var(--silver);
    margin-bottom:6px;
  }
  .brand span { color:var(--gold); }

  .tagline {
    font-family:'Fira Code', monospace;
    font-size:12px; color:var(--muted);
    letter-spacing:.08em;
    margin-bottom:48px;
  }

  /* ── section label ── */
  .sec-label {
    align-self:flex-start;
    font-family:'Fira Code', monospace;
    font-size:10px; font-weight:500;
    letter-spacing:.14em; text-transform:uppercase;
    color:var(--gold-dim);
    margin-bottom:10px;
    margin-top:28px;
  }
  .sec-label:first-of-type { margin-top:0; }

  /* ── query textarea ── */
  .query-box {
    width:100%;
    background:var(--card);
    border:1px solid var(--border-hi);
    border-radius:16px;
    padding:18px 20px;
    font-family:'Space Grotesk', sans-serif;
    font-size:15px; color:var(--text);
    resize:none; outline:none;
    line-height:1.6;
    transition:border-color .2s;
    min-height:96px;
  }
  .query-box:focus { border-color:rgba(245,200,66,.5); }
  .query-box::placeholder { color:var(--muted); }

  /* ── run button ── */
  .run-btn {
    width:100%;
    margin-top:14px;
    background:var(--gold);
    border:none; border-radius:14px;
    padding:16px;
    font-family:'Space Grotesk', sans-serif;
    font-size:15px; font-weight:700;
    color:#0a0700;
    cursor:pointer;
    letter-spacing:.02em;
    transition:opacity .2s, transform .1s;
    display:flex; align-items:center; justify-content:center; gap:10px;
  }
  .run-btn:hover:not(:disabled) { opacity:.88; }
  .run-btn:active:not(:disabled){ transform:scale(.99); }
  .run-btn:disabled { opacity:.35; cursor:not-allowed; }

  .run-icon { font-size:18px; }

  /* ── pipeline row ── */
  .pipeline {
    width:100%;
    display:flex;
    gap:8px;
    margin-top:28px;
  }
  .pip-step {
    flex:1;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 6px;
    text-align:center;
    font-size:11px; font-weight:600;
    color:var(--muted);
    letter-spacing:.04em;
    transition:all .3s;
  }
  .pip-step .pip-icon { display:block; font-size:16px; margin-bottom:4px; }
  .pip-step.active {
    border-color:rgba(245,200,66,.5);
    color:var(--gold);
    background:rgba(245,200,66,.05);
  }
  .pip-step.done {
    border-color:rgba(34,211,165,.4);
    color:var(--green);
    background:rgba(34,211,165,.05);
  }

  /* ── log panel ── */
  .log-panel {
    width:100%;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    overflow:hidden;
    margin-top:28px;
    display:none;
  }
  .log-panel.show { display:block; }

  .log-top {
    display:flex; align-items:center; gap:8px;
    padding:10px 16px;
    border-bottom:1px solid var(--border);
    background:var(--surface);
  }
  .log-top-label {
    font-family:'Fira Code', monospace;
    font-size:10px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--muted); flex:1;
  }
  .live-dot {
    width:7px; height:7px; border-radius:50%;
    background:var(--green);
    animation:blink 1.4s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  .log-scroll {
    padding:14px 16px;
    max-height:200px; overflow-y:auto;
    font-family:'Fira Code', monospace;
    font-size:12px; line-height:2;
  }
  .log-scroll::-webkit-scrollbar { width:3px; }
  .log-scroll::-webkit-scrollbar-thumb { background:var(--border-hi); border-radius:4px; }

  .ll { color:var(--muted); }
  .ll.p  { color:#93c5fd; }
  .ll.r  { color:#c4b5fd; }
  .ll.c  { color:#fcd34d; }
  .ll.w  { color:var(--green); }

  /* ── divider ── */
  .divider {
    width:100%; height:1px;
    background:var(--border);
    margin:32px 0 0;
    display:none;
  }
  .divider.show { display:block; }

  /* ── report panel ── */
  .report-wrap {
    width:100%;
    display:none;
  }
  .report-wrap.show { display:block; }

  .report-card {
    width:100%;
    background:var(--card);
    border:1px solid var(--border-hi);
    border-radius:16px;
    overflow:hidden;
    margin-top:28px;
  }

  .report-top {
    display:flex; align-items:center; gap:10px;
    padding:14px 20px;
    border-bottom:1px solid var(--border);
    background:var(--surface);
  }
  .report-top-label {
    font-size:13px; font-weight:600; color:var(--green); flex:1;
  }

  .view-btn {
    display:flex; align-items:center; gap:6px;
    background:transparent;
    border:1px solid var(--border-hi);
    border-radius:8px; padding:7px 14px;
    font-family:'Space Grotesk', sans-serif;
    font-size:12px; font-weight:600; color:var(--silver);
    cursor:pointer; text-decoration:none;
    transition:all .2s;
  }
  .view-btn:hover { border-color:var(--gold); color:var(--gold); }

  .report-body {
    padding:24px;
    max-height:500px; overflow-y:auto;
    font-size:14px; line-height:1.8;
  }
  .report-body::-webkit-scrollbar { width:3px; }
  .report-body::-webkit-scrollbar-thumb { background:var(--border-hi); border-radius:4px; }

  .report-body h1 {
    font-size:22px; font-weight:700;
    color:var(--silver);
    margin-bottom:20px; padding-bottom:14px;
    border-bottom:1px solid var(--border);
  }
  .report-body h2 {
    font-size:15px; font-weight:600; color:var(--gold);
    margin:24px 0 8px;
    padding-left:10px;
    border-left:2px solid var(--gold-dim);
  }
  .report-body h3 {
    font-size:13px; font-weight:600;
    color:var(--silver); margin:16px 0 6px;
  }
  .report-body p  { color:#94a3b8; margin-bottom:8px; }
  .report-body ul { padding-left:18px; margin-bottom:10px; }
  .report-body li { color:#94a3b8; margin-bottom:5px; }
  .report-body a  { color:var(--gold); text-decoration:none; }
  .report-body a:hover { text-decoration:underline; }
  .report-body strong { color:var(--silver); }

  /* ── pdf section ── */
  .pdf-section {
    width:100%;
    display:none;
    margin-top:16px;
  }
  .pdf-section.show { display:block; }

  .pdf-card {
    width:100%;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:18px 20px;
    display:flex; align-items:center; gap:16px;
  }
  .pdf-icon-box {
    width:44px; height:44px; border-radius:10px;
    background:rgba(245,200,66,.1);
    border:1px solid rgba(245,200,66,.2);
    display:flex; align-items:center; justify-content:center;
    font-size:22px; flex-shrink:0;
  }
  .pdf-info { flex:1; }
  .pdf-name { font-size:13px; font-weight:600; color:var(--silver); }
  .pdf-size { font-family:'Fira Code', monospace; font-size:11px; color:var(--muted); margin-top:2px; }

  .download-btn {
    display:flex; align-items:center; gap:8px;
    background:var(--gold);
    border:none; border-radius:10px;
    padding:10px 18px;
    font-family:'Space Grotesk', sans-serif;
    font-size:13px; font-weight:700;
    color:#0a0700; cursor:pointer;
    text-decoration:none;
    transition:opacity .2s;
  }
  .download-btn:hover { opacity:.85; }

  /* ── email section ── */
  .email-section {
    width:100%;
    display:none;
    margin-top:16px;
  }
  .email-section.show { display:block; }

  .email-card {
    width:100%;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:20px;
  }
  .email-card-label {
    font-size:13px; font-weight:600; color:var(--silver);
    margin-bottom:4px;
  }
  .email-card-sub {
    font-family:'Fira Code', monospace;
    font-size:11px; color:var(--muted); margin-bottom:14px;
  }
  .email-input {
    width:100%;
    background:var(--surface);
    border:1px solid var(--border-hi);
    border-radius:10px;
    padding:13px 16px;
    font-family:'Space Grotesk', sans-serif;
    font-size:14px; color:var(--text);
    outline:none;
    transition:border-color .2s;
    margin-bottom:12px;
  }
  .email-input:focus { border-color:rgba(245,200,66,.5); }
  .email-input::placeholder { color:var(--muted); }

  .send-btn {
    width:100%;
    background:transparent;
    border:1.5px solid var(--gold-dim);
    border-radius:10px; padding:13px;
    font-family:'Space Grotesk', sans-serif;
    font-size:14px; font-weight:700;
    color:var(--gold); cursor:pointer;
    transition:all .2s;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .send-btn:hover:not(:disabled) { background:rgba(245,200,66,.07); }
  .send-btn:disabled { opacity:.35; cursor:not-allowed; }

  /* ── toast ── */
  .toast {
    position:fixed; bottom:28px; left:50%;
    transform:translateX(-50%) translateY(80px);
    background:var(--card);
    border:1px solid var(--border-hi);
    border-radius:12px; padding:12px 22px;
    font-size:13px; font-weight:600;
    display:flex; align-items:center; gap:8px;
    transition:transform .35s cubic-bezier(.34,1.56,.64,1), opacity .35s;
    opacity:0; z-index:99;
    white-space:nowrap;
  }
  .toast.up { transform:translateX(-50%) translateY(0); opacity:1; }
  .toast.ok  { color:var(--green); border-color:rgba(34,211,165,.3); }
  .toast.err { color:var(--red);   border-color:rgba(248,113,113,.3); }

  /* ── fade-in ── */
  .fade { animation:fadeUp .5s ease both; }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }
</style>
</head>
<body>

<div class="wrap">

  <!-- Header -->
  <div class="logo-ring fade"><span class="logo-icon">🔭</span></div>
  <div class="brand fade">Research <span>Agent</span></div>
  <div class="tagline fade">// autonomous · multi-step · self-critiquing</div>

  <!-- ASK ANYTHING -->
  <div class="sec-label fade">Ask anything</div>
  <textarea class="query-box fade" id="queryInput"
    placeholder="e.g. What is the future of AI in healthcare?"
    rows="3"></textarea>

  <!-- RUN -->
  <button class="run-btn fade" id="runBtn" onclick="startResearch()">
    <span class="run-icon">▶</span> Run Research
  </button>

  <!-- Pipeline steps -->
  <div class="pipeline fade">
    <div class="pip-step" id="s-planner">
      <span class="pip-icon">🗺</span>Planner
    </div>
    <div class="pip-step" id="s-researcher">
      <span class="pip-icon">🔍</span>Researcher
    </div>
    <div class="pip-step" id="s-critic">
      <span class="pip-icon">🧠</span>Critic
    </div>
    <div class="pip-step" id="s-writer">
      <span class="pip-icon">✍</span>Writer
    </div>
  </div>

  <!-- LIVE LOGS -->
  <div class="log-panel" id="logPanel">
    <div class="log-top">
      <span class="log-top-label">Live output</span>
      <span class="live-dot" id="liveDot"></span>
    </div>
    <div class="log-scroll" id="logScroll"></div>
  </div>

  <div class="divider" id="divider"></div>

  <!-- REPORT -->
  <div class="report-wrap" id="reportWrap">
    <div class="sec-label">Report</div>
    <div class="report-card">
      <div class="report-top">
        <span class="report-top-label">✅ Research complete</span>
        <button class="view-btn" onclick="toggleReport()" id="toggleBtn">▼ View</button>
      </div>
      <div class="report-body" id="reportBody" style="display:none"></div>
    </div>
  </div>

  <!-- PDF VIEW -->
  <div class="pdf-section" id="pdfSection">
    <div class="sec-label">PDF Report</div>
    <div class="pdf-card">
      <div class="pdf-icon-box">📄</div>
      <div class="pdf-info">
        <div class="pdf-name" id="pdfName">report.pdf</div>
        <div class="pdf-size">Click to download</div>
      </div>
      <a class="download-btn" id="downloadBtn" href="#" target="_blank">
        ⬇ Download
      </a>
    </div>
  </div>

  <!-- EMAIL -->
  <div class="email-section" id="emailSection">
    <div class="sec-label">Send via Email</div>
    <div class="email-card">
      <div class="email-card-label">Email this report</div>
      <div class="email-card-sub">PDF will be attached automatically</div>
      <input class="email-input" id="emailInput"
             type="email" placeholder="recipient@example.com" />
      <button class="send-btn" id="sendBtn" onclick="sendEmail()">
        ✉ Send Report
      </button>
    </div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  let currentQuery  = '';
  let currentReport = '';
  let currentSafe   = '';
  let reportVisible = false;

  document.getElementById('queryInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); startResearch(); }
  });

  function step(id, state) {
    const el = document.getElementById('s-' + id);
    if (!el) return;
    el.className = 'pip-step' + (state ? ' ' + state : '');
  }

  function addLog(text) {
    const body = document.getElementById('logScroll');
    const d = document.createElement('div');
    d.className = 'll';
    const t = text.toLowerCase();
    if (t.includes('[planner]'))    { d.className += ' p'; step('planner','active'); }
    if (t.includes('[researcher]')) { d.className += ' r'; step('planner','done'); step('researcher','active'); }
    if (t.includes('[critic]'))     { d.className += ' c'; step('researcher','done'); step('critic','active'); }
    if (t.includes('[writer]'))     { d.className += ' w'; step('critic','done'); step('writer','active'); }
    d.textContent = text;
    body.appendChild(d);
    body.scrollTop = body.scrollHeight;
  }

  function md2html(md) {
    let h = md
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm,  '<h2>$1</h2>')
      .replace(/^# (.+)$/gm,   '<h1>$1</h1>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/^\* (.+)$/gm,  '<li>$1</li>')
      .replace(/^- (.+)$/gm,   '<li>$1</li>')
      .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>');
    h = h.replace(/(<li>.*?<\/li>\n?)+/gs, m => `<ul>${m}</ul>`);
    return h.split('\n').map(l => {
      l = l.trim();
      if (!l) return '';
      if (l.startsWith('<')) return l;
      return `<p>${l}</p>`;
    }).join('\n');
  }

  function toggleReport() {
    const body = document.getElementById('reportBody');
    const btn  = document.getElementById('toggleBtn');
    reportVisible = !reportVisible;
    body.style.display = reportVisible ? 'block' : 'none';
    btn.textContent    = reportVisible ? '▲ Hide' : '▼ View';
  }

  async function startResearch() {
    const query = document.getElementById('queryInput').value.trim();
    if (!query) { showToast('Enter a research question', 'err'); return; }

    currentQuery = query; currentReport = ''; currentSafe = '';
    reportVisible = false;

    const runBtn = document.getElementById('runBtn');
    runBtn.disabled = true;
    runBtn.innerHTML = '<span class="run-icon">⏳</span> Researching…';

    document.getElementById('logScroll').innerHTML = '';
    document.getElementById('logPanel').classList.add('show');
    document.getElementById('reportWrap').classList.remove('show');
    document.getElementById('pdfSection').classList.remove('show');
    document.getElementById('emailSection').classList.remove('show');
    document.getElementById('divider').classList.remove('show');
    document.getElementById('reportBody').style.display = 'none';
    document.getElementById('toggleBtn').textContent = '▼ View';
    ['planner','researcher','critic','writer'].forEach(s => step(s,''));

    const es = new EventSource(`/research?query=${encodeURIComponent(query)}`);

    es.onmessage = e => {
      if (e.data === '[DONE]') {
        es.close();
        runBtn.disabled = false;
        runBtn.innerHTML = '<span class="run-icon">▶</span> Run Research';
        document.getElementById('liveDot').style.animationPlayState = 'paused';
        step('writer','done');
        return;
      }
      try {
        const msg = JSON.parse(e.data);
        if (msg.type === 'log') {
          addLog(msg.text);
        } else if (msg.type === 'report') {
          currentReport = msg.text;
          currentSafe   = msg.pdf;

          document.getElementById('reportBody').innerHTML = md2html(msg.text);
          document.getElementById('reportWrap').classList.add('show');

          // PDF section
          document.getElementById('pdfName').textContent = msg.pdf + '.pdf';
          document.getElementById('downloadBtn').href = `/download/${msg.pdf}`;
          document.getElementById('pdfSection').classList.add('show');

          // Email section
          document.getElementById('emailSection').classList.add('show');
          document.getElementById('divider').classList.add('show');

        } else if (msg.type === 'error') {
          addLog('ERROR: ' + msg.text);
          runBtn.disabled = false;
          runBtn.innerHTML = '<span class="run-icon">▶</span> Run Research';
        }
      } catch {}
    };

    es.onerror = () => {
      es.close();
      runBtn.disabled = false;
      runBtn.innerHTML = '<span class="run-icon">▶</span> Run Research';
    };
  }

  async function sendEmail() {
    const email = document.getElementById('emailInput').value.trim();
    if (!email)         { showToast('Enter an email address', 'err'); return; }
    if (!currentReport) { showToast('Run a query first', 'err'); return; }

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    btn.innerHTML = '⏳ Sending…';

    const res  = await fetch('/send-email', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ query:currentQuery, report:currentReport, email }),
    });
    const data = await res.json();
    btn.disabled = false;
    btn.innerHTML = '✉ Send Report';
    showToast(data.msg, data.ok ? 'ok' : 'err');
  }

  function showToast(msg, type='ok') {
    const t = document.getElementById('toast');
    t.textContent = (type==='ok' ? '✅ ' : '❌ ') + msg;
    t.className = `toast ${type} up`;
    setTimeout(() => t.className = 'toast', 3600);
  }
</script>
</body>
</html>
